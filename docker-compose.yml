services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: babji
      POSTGRES_USER: babji
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-babji_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U babji"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DATABASE_URL: postgres://babji:${POSTGRES_PASSWORD:-babji_dev}@postgres:5432/babji
      MEMORY_BASE_DIR: /app/data/tenants
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    volumes:
      - tenant_data:/app/data/tenants
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  oauth-portal:
    build:
      context: .
      dockerfile: Dockerfile.oauth-portal
    ports:
      - "3100:3100"
    environment:
      NEXT_PUBLIC_BASE_URL: ${OAUTH_PORTAL_URL:-http://localhost:3100}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      META_CLIENT_ID: ${META_CLIENT_ID:-}
      META_CLIENT_SECRET: ${META_CLIENT_SECRET:-}
      LINKEDIN_CLIENT_ID: ${LINKEDIN_CLIENT_ID:-}
      LINKEDIN_CLIENT_SECRET: ${LINKEDIN_CLIENT_SECRET:-}
      X_CLIENT_ID: ${X_CLIENT_ID:-}
      X_CLIENT_SECRET: ${X_CLIENT_SECRET:-}

  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    ports:
      - "3200:3200"
    environment:
      DATABASE_URL: postgres://babji:${POSTGRES_PASSWORD:-babji_dev}@postgres:5432/babji
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  tenant_data:
